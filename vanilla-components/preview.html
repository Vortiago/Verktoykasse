<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Component preview</title>
    <!-- The shared design tokens — components render in their real token context. -->
    <link rel="stylesheet" href="./tokens.css" />
    <!-- The shared tone mixin (base set → --tone); load right after tokens. -->
    <link rel="stylesheet" href="./tones.css" />
    <link rel="modulepreload" href="./preview.js" />
    <link rel="modulepreload" href="./previews/registry.js" />
    <link rel="modulepreload" href="./lib/templates.js" />
    <link rel="modulepreload" href="./lib/chrome.js" />
    <script type="module" src="./preview.js"></script>
  </head>
  <body>
    <header class="preview-top">
      <strong>Components</strong>
      <button id="theme" type="button" title="Toggle theme">auto</button>
    </header>

    <div class="preview-layout">
      <nav id="rail" class="rail" aria-label="Components"></nav>
      <main id="canvas" class="canvas"></main>
    </div>

    <output id="errbar" hidden></output>

    <!-- Harness templates — no HTML strings in JS (SKILL.md invariant). -->
    <template id="tpl-preview-railitem">
      <a class="rail-item" data-slot="link"></a>
    </template>

    <template id="tpl-preview-frame">
      <figure class="frame">
        <div class="frame-stage" data-slot="stage"></div>
        <figcaption class="frame-caption">
          <b data-slot="name"></b> · <code data-slot="usage"></code>
        </figcaption>
      </figure>
    </template>

    <!-- One shared view per component (not per variant — the underlying files
         are identical across variants). Preview tab shows the frame stack;
         HTML/CSS/JS tabs replace it with that file's source. -->
    <template id="tpl-preview-component">
      <div class="component-view">
        <div class="source-tabs" role="tablist" aria-label="View">
          <button class="source-tab" type="button" role="tab" data-slot="tab-preview" aria-selected="true">Preview</button>
          <button class="source-tab" type="button" role="tab" data-slot="tab-html">HTML</button>
          <button class="source-tab" type="button" role="tab" data-slot="tab-css">CSS</button>
          <button class="source-tab" type="button" role="tab" data-slot="tab-js">JS</button>
          <button class="source-copy" type="button" data-slot="copy" hidden>Copy</button>
        </div>
        <div class="frames" data-slot="frames"></div>
        <pre class="source-code" data-slot="code" hidden><code data-slot="code-text"></code></pre>
      </div>
    </template>

    <template id="tpl-preview-error">
      <pre class="frame-error" data-slot="msg"></pre>
    </template>
  </body>
</html>
