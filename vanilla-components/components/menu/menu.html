<template id="tpl-menu">
  <div class="menu" popover="auto" role="menu"></div>
</template>
<template id="tpl-menu-item">
  <button class="menu-item" type="button" role="menuitem">
    <span class="menu-item-icon" data-slot="icon" hidden></span>
    <span class="menu-item-label" data-slot="label"></span>
  </button>
</template>
<template id="tpl-menu-separator">
  <div class="menu-separator" role="separator"></div>
</template>
