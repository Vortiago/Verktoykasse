<template id="tpl-app-bar">

    <div class="app-bar-brand">
      <span class="app-bar-logo" data-slot="logo" hidden></span>
      <div class="app-bar-titles">
        <span class="app-bar-title" data-slot="title"></span>
        <span class="app-bar-tagline" data-slot="tagline" hidden></span>

    <nav class="app-bar-nav" data-slot="nav" aria-label="Views"></nav>

</template>
