<template id="tpl-alert">
  <div class="alert">
    <div class="alert-body">
      <strong class="alert-title" data-slot="title" hidden></strong>
      <span class="alert-message" data-slot="message"></span>
    </div>
    <button class="alert-close" data-slot="close" type="button" aria-label="Dismiss" hidden>×</button>
  </div>
</template>
