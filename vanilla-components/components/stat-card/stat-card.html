<template id="tpl-stat-card">
  <div class="stat-card">
    <div class="stat-card-label" data-slot="label"></div>
    <div class="stat-card-value">
      <span class="stat-card-num" data-slot="value"></span>
      <span class="stat-card-unit" data-slot="unit" hidden></span>
    </div>
    <div class="stat-card-hint" data-slot="hint" hidden></div>
  </div>
</template>
