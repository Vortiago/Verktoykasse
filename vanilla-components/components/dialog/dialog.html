<template id="tpl-dialog">
  <dialog class="dialog">
    <header class="dialog-head" data-slot="head" hidden>
      <span class="dialog-title" data-slot="title"></span>
      <button class="dialog-close" data-slot="close" type="button" aria-label="Close">✕</button>
    </header>
    <div class="dialog-body" data-slot="body"></div>
    <footer class="dialog-actions" data-slot="actions" hidden></footer>
  </dialog>
</template>
